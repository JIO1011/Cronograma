<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios de Laboratorio - UPS</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <!-- HEADER -->
        <header class="header">
            <div class="header-content">
                <img src="/assets/logo-ups.png" alt="UPS" class="logo-left" onerror="this.style.display='none'">
                <h1>Horarios Prácticas de Laboratorio</h1>
                <a href="/admin.html" class="btn-admin" title="Panel de Administración">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6m-9-9h6m6 0h6"></path>
                    </svg>
                    Administrar
                </a>
            </div>
        </header>

        <!-- RELOJ Y FECHA -->
        <section class="time-section">
            <div class="time-container">
                <div id="reloj" class="clock">00:00:00</div>
                <div id="fecha" class="date">Cargando...</div>
            </div>
        </section>

        <!-- TABLA DE HORARIOS -->
        <div class="table-wrapper">
            <table class="schedule-table" id="tabla-horarios">
                <thead>
                    <tr>
                        <th>Día</th>
                        <th>Materia</th>
                        <th>Profesor</th>
                        <th>Laboratorio</th>
                        <th>Hora</th>
                        <th>Encargado</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <tr>
                        <td colspan="6" class="empty-state">
                            <div class="loading">
                                <div class="spinner"></div>
                                <p>Cargando horarios...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- LEYENDA -->
        <div class="legend">
            <div class="legend-item">
                <span class="legend-dot green"></span>
                <span>Próxima clase (7-10 min)</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot yellow"></span>
                <span>Iniciando ahora (0-7 min)</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot red"></span>
                <span>En curso o finalizada</span>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="footer">
            <p>&copy; 2025 JIO - Sistema de Horarios UPS</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
